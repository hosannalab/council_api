name: Council API Multi-Stage CI/CD

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage to deploy'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: council-api-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPOSITORY: council-api

jobs:
  ci:
    name: CI - Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/council_ci?schema=public
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -p tsconfig.build.json --noEmit

      - name: Validate Prisma schema
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/council_ci?schema=public
        run: npx prisma validate

      - name: Generate image tag
        id: meta
        run: echo "tag=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

  build-dev:
    name: Build & Push DEV Image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: ci
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || inputs.stage == 'dev')
    environment: DEV

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:dev-${{ needs.ci.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:dev-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:latest

  deploy-dev:
    name: Deploy DEV
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - ci
      - build-dev
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || inputs.stage == 'dev')
    environment: DEV

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e

            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:dev-${{ needs.ci.outputs.image_tag }}"
            TRAEFIK_HOST="${{ vars.TRAEFIK_HOST }}"
            if [ -z "$TRAEFIK_HOST" ]; then TRAEFIK_HOST="council.api-dev.hosannalab.com"; fi

            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            docker network inspect proxy >/dev/null 2>&1 || docker network create proxy
            docker pull "$IMAGE"

            docker run --rm \
              --network proxy \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              "$IMAGE" npx prisma migrate deploy

            docker rm -f council-api-dev || true

            docker run -d \
              --name council-api-dev \
              --restart unless-stopped \
              --network proxy \
              -e NODE_ENV=production \
              -e PORT=${{ vars.PORT }} \
              -e APP_URL="${{ vars.APP_URL }}" \
              -e CORS_ORIGINS="${{ vars.CORS_ORIGINS }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e JWT_ACCESS_SECRET="${{ secrets.JWT_ACCESS_SECRET }}" \
              -e JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" \
              -e JWT_ACCESS_TTL_SECONDS="${{ vars.JWT_ACCESS_TTL_SECONDS }}" \
              -e JWT_REFRESH_TTL_SECONDS="${{ vars.JWT_REFRESH_TTL_SECONDS }}" \
              -e SMTP_HOST="${{ vars.SMTP_HOST }}" \
              -e SMTP_PORT="${{ vars.SMTP_PORT }}" \
              -e SMTP_USER="${{ secrets.SMTP_USER }}" \
              -e SMTP_PASS="${{ secrets.SMTP_PASS }}" \
              -e SMTP_FROM="${{ vars.SMTP_FROM }}" \
              -l traefik.enable=true \
              -l "traefik.http.routers.council-api-dev.rule=Host(\`$TRAEFIK_HOST\`)" \
              -l traefik.http.routers.council-api-dev.entrypoints=websecure \
              -l traefik.http.routers.council-api-dev.tls.certresolver=letsencrypt \
              -l traefik.http.services.council-api-dev.loadbalancer.server.port=${{ vars.PORT }} \
              "$IMAGE"

            docker image prune -af

  build-prod:
    name: Build & Push PROD Image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'workflow_dispatch' && inputs.stage == 'prod'
    environment: PROD

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:prod-${{ needs.ci.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:prod-latest

  deploy-prod:
    name: Deploy PROD
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - ci
      - build-prod
    if: github.ref == 'refs/heads/master' && github.event_name == 'workflow_dispatch' && inputs.stage == 'prod'
    environment: PROD

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e

            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:prod-${{ needs.ci.outputs.image_tag }}"
            TRAEFIK_HOST="${{ vars.TRAEFIK_HOST }}"
            if [ -z "$TRAEFIK_HOST" ]; then TRAEFIK_HOST="council.api.hosannalab.com"; fi

            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            docker network inspect proxy >/dev/null 2>&1 || docker network create proxy
            docker pull "$IMAGE"

            docker run --rm \
              --network proxy \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              "$IMAGE" npx prisma migrate deploy

            docker rm -f council-api-prod || true

            docker run -d \
              --name council-api-prod \
              --restart unless-stopped \
              --network proxy \
              -e NODE_ENV=production \
              -e PORT=${{ vars.PORT }} \
              -e APP_URL="${{ vars.APP_URL }}" \
              -e CORS_ORIGINS="${{ vars.CORS_ORIGINS }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e JWT_ACCESS_SECRET="${{ vars.JWT_ACCESS_SECRET }}" \
              -e JWT_REFRESH_SECRET="${{ vars.JWT_REFRESH_SECRET }}" \
              -e JWT_ACCESS_TTL_SECONDS="${{ vars.JWT_ACCESS_TTL_SECONDS }}" \
              -e JWT_REFRESH_TTL_SECONDS="${{ vars.JWT_REFRESH_TTL_SECONDS }}" \
              -e SMTP_HOST="${{ vars.SMTP_HOST }}" \
              -e SMTP_PORT="${{ vars.SMTP_PORT }}" \
              -e SMTP_USER="${{ secrets.SMTP_USER }}" \
              -e SMTP_PASS="${{ secrets.SMTP_PASS }}" \
              -e SMTP_FROM="${{ vars.SMTP_FROM }}" \
              -l traefik.enable=true \
              -l "traefik.http.routers.council-api-prod.rule=Host(\`$TRAEFIK_HOST\`)" \
              -l traefik.http.routers.council-api-prod.entrypoints=websecure \
              -l traefik.http.routers.council-api-prod.tls.certresolver=letsencrypt \
              -l traefik.http.services.council-api-prod.loadbalancer.server.port=${{ vars.PORT }} \
              "$IMAGE"

            docker image prune -af
