name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/council?schema=public

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/council?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters-long

      - name: Test
        run: npm test
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/council?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters-long
